<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #f5c518;
            margin-bottom: 20px;
        }

        .game-canvas {
            background-color: #000;
            width: 100%;
            max-width: 500px;
            height: 300px;
            margin: 20px auto;
            position: relative;
            border: 3px solid #f5c518;
            border-radius: 8px;
            overflow: hidden;
        }

        .player {
            width: 20px;
            height: 20px;
            background-color: #f5c518;
            border-radius: 50%;
            position: absolute;
            bottom: 20px;
            left: calc(50% - 10px);
            transition: left 0.1s ease;
        }

        .target {
            width: 20px;
            height: 20px;
            background-color: #e74c3c;
            border-radius: 4px;
            position: absolute;
            top: -30px;
            animation: fall 2s linear infinite;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            background-color: #f5c518;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #e6b800;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }

        @keyframes fall {
            0% {
                top: -30px;
            }

            100% {
                top: 330px;
            }
        }

        @media (max-width: 600px) {
            .game-canvas {
                height: 250px;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="game-container">
        <h1>Example Game</h1>
        <div class="score">Score: <span id="score">0</span></div>

        <div class="game-canvas" id="gameCanvas">
            <div class="player" id="player"></div>
        </div>

        <div class="controls">
            <button id="leftBtn">← Move Left</button>
            <button id="rightBtn">Move Right →</button>
        </div>

        <div class="instructions">
            <h2>How to Play</h2>
            <p>Move the yellow circle with the buttons to catch the falling red squares.</p>
            <p>Each catch gives you 10 points. Try to get the highest score!</p>
        </div>
    </div>

    <script>
        // Game variables
        let score = 0;
        let playerPosition = 50;
        let gameInterval;
        let gameActive = true;

        // DOM elements
        const gameCanvas = document.getElementById('gameCanvas');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Game dimensions
        const canvasWidth = gameCanvas.offsetWidth;
        const playerWidth = player.offsetWidth;

        // Event listeners
        leftBtn.addEventListener('click', moveLeft);
        rightBtn.addEventListener('click', moveRight);

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });

        // Functions to move player
        function moveLeft() {
            if (!gameActive) return;
            playerPosition = Math.max(playerPosition - 5, 0);
            updatePlayerPosition();
        }

        function moveRight() {
            if (!gameActive) return;
            playerPosition = Math.min(playerPosition + 5, 100);
            updatePlayerPosition();
        }

        function updatePlayerPosition() {
            player.style.left = `calc(${playerPosition}% - 10px)`;
        }

        // Create targets
        function createTarget() {
            if (!gameActive) return;

            const target = document.createElement('div');
            target.className = 'target';

            // Random position
            const randomPosition = Math.floor(Math.random() * 90) + 5;
            target.style.left = `calc(${randomPosition}% - 10px)`;

            // Random fall speed
            const fallSpeed = Math.random() * 1.5 + 1;
            target.style.animation = `fall ${fallSpeed}s linear forwards`;

            gameCanvas.appendChild(target);

            // Check collision and remove when animation ends
            target.addEventListener('animationend', () => {
                checkCollision(target, randomPosition);
                target.remove();
            });
        }

        // Check if player catches the target
        function checkCollision(target, targetPosition) {
            // Simple collision detection
            if (Math.abs(playerPosition - targetPosition) < 10) {
                // Caught the target!
                score += 10;
                scoreDisplay.textContent = score;
                target.style.backgroundColor = '#2ecc71'; // Change color on catch
            }
        }

        // Start game logic
        function startGame() {
            gameActive = true;
            score = 0;
            scoreDisplay.textContent = score;

            // Create targets at intervals
            gameInterval = setInterval(createTarget, 1500);

            // Create initial targets
            for (let i = 0; i < 3; i++) {
                setTimeout(() => createTarget(), i * 500);
            }
        }

        // Initialize game
        startGame();
    </script>
</body>

</html>
